<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Calculator App</title>
  </head>
  <body>
    <main class="calc-app">
      <header>
        <h1>Calculator Application</h1>
        <p>Perform basic arithmetic operations quickly.</p>
      </header>

      <section class="calculator" aria-label="Simple calculator">
        <input type="text" id="display" class="display" value="0" readonly aria-label="Calculator display" />

        <div class="buttons">
          <button type="button" class="btn btn-clear" data-action="clear">C</button>
          <button type="button" class="btn" data-action="operator" data-value="/">/</button>
          <button type="button" class="btn" data-action="operator" data-value="*">*</button>
          <button type="button" class="btn" data-action="operator" data-value="-">-</button>

          <button type="button" class="btn" data-action="number" data-value="7">7</button>
          <button type="button" class="btn" data-action="number" data-value="8">8</button>
          <button type="button" class="btn" data-action="number" data-value="9">9</button>
          <button type="button" class="btn" data-action="operator" data-value="+">+</button>

          <button type="button" class="btn" data-action="number" data-value="4">4</button>
          <button type="button" class="btn" data-action="number" data-value="5">5</button>
          <button type="button" class="btn" data-action="number" data-value="6">6</button>
          <button type="button" class="btn btn-equal" data-action="equal">=</button>

          <button type="button" class="btn" data-action="number" data-value="1">1</button>
          <button type="button" class="btn" data-action="number" data-value="2">2</button>
          <button type="button" class="btn" data-action="number" data-value="3">3</button>
          <button type="button" class="btn" data-action="number" data-value="0">0</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
