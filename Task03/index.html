<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Image Gallery Lightbox</title>
  </head>
  <body>
    <header>
      <h1>Image Gallery Lightbox</h1>
    </header>

    <!-- Main body -->
    <main>
      <div id="gallery">
        <img src="./imgs/1.jpg" alt="Gallery image 1" id="1" />
        <img src="./imgs/2.png" alt="Gallery image 2" id="2" />
        <img src="./imgs/3.jpg" alt="Gallery image 3" id="3" />
        <img src="./imgs/4.jpg" alt="Gallery image 4" id="4" />
        <img src="./imgs/5.jpg" alt="Gallery image 5" id="5" />
        <img src="./imgs/6.jpg" alt="Gallery image 6" id="6" />
      </div>

      <div id="modal">
        <img src="" alt="" id="modalImg" />
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
